<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Stop Loss Assistant</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
    <i class="fas fa-moon" id="themeIcon"></i>
  </button>

  <div class="login-page">
    <div class="login-card" id="loginCard">
      <!-- Logo -->
      <div class="login-logo" id="loginLogo">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="70" height="70">
          <defs>
            <linearGradient id="lGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#3b82f6"/>
              <stop offset="100%" style="stop-color:#8b5cf6"/>
            </linearGradient>
            <linearGradient id="lEye" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#06b6d4"/>
              <stop offset="100%" style="stop-color:#22d3ee"/>
            </linearGradient>
            <filter id="lGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <line x1="100" y1="28" x2="100" y2="48" stroke="url(#lGrad)" stroke-width="3" stroke-linecap="round"/>
          <circle cx="100" cy="22" r="6" fill="url(#lEye)" filter="url(#lGlow)"/>
          <rect x="55" y="48" width="90" height="70" rx="18" fill="url(#lGrad)"/>
          <rect x="65" y="55" width="70" height="50" rx="12" fill="#0a0e1a" opacity="0.6"/>
          <circle cx="82" cy="78" r="10" fill="url(#lEye)" filter="url(#lGlow)"/>
          <circle cx="118" cy="78" r="10" fill="url(#lEye)" filter="url(#lGlow)"/>
          <circle cx="82" cy="78" r="4" fill="#fff"/>
          <circle cx="118" cy="78" r="4" fill="#fff"/>
          <path d="M 85 95 Q 100 105 115 95" stroke="url(#lEye)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <rect x="42" y="62" width="13" height="30" rx="5" fill="url(#lGrad)"/>
          <rect x="145" y="62" width="13" height="30" rx="5" fill="url(#lGrad)"/>
          <rect x="90" y="118" width="20" height="12" rx="4" fill="url(#lGrad)"/>
          <rect x="50" y="130" width="100" height="50" rx="14" fill="url(#lGrad)"/>
          <circle cx="100" cy="152" r="8" fill="url(#lEye)" filter="url(#lGlow)"/>
          <circle cx="100" cy="152" r="4" fill="#fff" opacity="0.8"/>
          <path d="M 100 160 L 92 164 L 92 170 Q 92 176 100 180 Q 108 176 108 170 L 108 164 Z" fill="none" stroke="url(#lEye)" stroke-width="1.5"/>
          <rect x="30" y="135" width="18" height="35" rx="8" fill="url(#lGrad)"/>
          <rect x="152" y="135" width="18" height="35" rx="8" fill="url(#lGrad)"/>
        </svg>
      </div>

      <!-- Title -->
      <h1 class="login-title">Stop Loss Assistant</h1>
      <p class="login-subtitle">Smart Pattern Recognition System</p>

      <!-- Error Message -->
      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <!-- Success Message -->
      <div class="success-msg" id="successMsg">
        <i class="fas fa-check-circle"></i>
        <span id="successText"></span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label class="form-label">Username</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" class="form-input" id="username" placeholder="Enter username" autocomplete="username" required>
          </div>
        </div>

        <div class="input-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-input" id="password" placeholder="Enter password" autocomplete="current-password" required>
            <button type="button" class="eye-btn" onclick="togglePassword()">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <label class="check-label">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark"></span>
            Remember me
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg login-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" id="btnLoader">
            <i class="fas fa-circle-notch fa-spin"></i>
          </span>
        </button>
      </form>

      <!-- Footer Info -->
      <div class="login-footer">
        <div class="divider">
          <span>Secure Access</span>
        </div>
        <div class="security-info">
          <i class="fas fa-shield-alt"></i>
          <span>256-bit Encrypted | Local Storage</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Audio Elements -->
  <audio id="correctSound" preload="auto"></audio>
  <audio id="wrongSound" preload="auto"></audio>

  <script src="shared/db.js"></script>
  <script src="shared/auth.js"></script>
  <script src="shared/app.js"></script>
  <script>
    // Audio system using Web Audio API for fallback
    let audioCtx = null;

    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playCorrectSound() {
      try {
        const ctx = getAudioContext();
        const notes = [523.25, 659.25, 783.99];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
          gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.12);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.4);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + i * 0.12);
          osc.stop(ctx.currentTime + i * 0.12 + 0.4);
        });
      } catch(e) {}
    }

    function playWrongSound() {
      try {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
        // Second buzz
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'sawtooth';
        osc2.frequency.setValueAtTime(180, ctx.currentTime + 0.15);
        osc2.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.5);
        gain2.gain.setValueAtTime(0.15, ctx.currentTime + 0.15);
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(ctx.currentTime + 0.15);
        osc2.stop(ctx.currentTime + 0.55);
      } catch(e) {}
    }

    // Theme
    function updateThemeIcon() {
      const icon = document.getElementById('themeIcon');
      icon.className = storage.getTheme() === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
    }

    function toggleTheme() {
      storage.toggleTheme();
      document.documentElement.setAttribute('data-theme', storage.getTheme());
      updateThemeIcon();
    }

    // Password toggle
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    // Show messages
    function showError(msg) {
      document.getElementById('successMsg').classList.remove('show');
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.add('show');
    }

    function showSuccess(msg) {
      document.getElementById('errorMsg').classList.remove('show');
      const el = document.getElementById('successMsg');
      document.getElementById('successText').textContent = msg;
      el.classList.add('show');
    }

    function hideMessages() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    // Login handler
    async function handleLogin(e) {
      e.preventDefault();
      hideMessages();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;

      const btn = document.getElementById('loginBtn');
      const btnText = btn.querySelector('.btn-text');
      const loader = document.getElementById('btnLoader');

      btn.disabled = true;
      btnText.style.display = 'none';
      loader.style.display = 'inline-flex';

      try {
        const result = await auth.login(username, password);

        if (result.success) {
          playCorrectSound();
          showSuccess('Login successful! Redirecting...');

          if (remember) {
            auth.setRemember(username, password);
          } else {
            auth.clearRemember();
          }

          // Wait for sound to finish
          await new Promise(r => setTimeout(r, 1200));

          const redirect = result.user.role === 'admin'
            ? 'admin-panel/admin-dashboard.html'
            : 'user-panel/user-dashboard.html';

          window.location.href = redirect;
        } else {
          playWrongSound();
          showError(result.message);

          // Shake animation
          const card = document.getElementById('loginCard');
          card.classList.add('shake');
          setTimeout(() => card.classList.remove('shake'), 500);

          btn.disabled = false;
          btnText.style.display = 'inline';
          loader.style.display = 'none';
        }
      } catch (err) {
        playWrongSound();
        showError('An error occurred. Please try again.');
        btn.disabled = false;
        btnText.style.display = 'inline';
        loader.style.display = 'none';
      }
    }

    // Init
    async function init() {
      await app.init();
      storage.getTheme();
      document.documentElement.setAttribute('data-theme', storage.getTheme());
      updateThemeIcon();

      // Check existing session
      const session = await auth.validateSession();
      if (session) {
        const redirect = session.role === 'admin'
          ? 'admin-panel/admin-dashboard.html'
          : 'user-panel/user-dashboard.html';
        window.location.href = redirect;
        return;
      }

      // Load remember me
      const remember = auth.getRemember();
      if (remember) {
        document.getElementById('username').value = remember.username;
        document.getElementById('password').value = remember.password;
        document.getElementById('rememberMe').checked = true;
      }

      // Animate card entrance
      setTimeout(() => {
        document.getElementById('loginCard').classList.add('visible');
      }, 100);
    }

    init();
  </script>
</body>
</html>
