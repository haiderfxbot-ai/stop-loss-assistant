<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pattern Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding-bottom: 20px;
        }

        .header {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 40px 20px;
            color: #ff6b6b;
        }

        .pattern-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pattern-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .pattern-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .pattern-category {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 217, 255, 0.2);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #00d9ff;
        }

        .pattern-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
        }

        .status-inactive {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .pattern-description {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .pattern-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .info-value {
            font-weight: 600;
            font-size: 14px;
        }

        .match-score {
            color: #00d9ff;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #00d9ff;
            border-radius: 2px;
        }

        .how-it-works {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .how-it-works p {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.7;
        }

        .performance-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #00d9ff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .success-rate {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rate-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .rate-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #2ed573);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .created-info {
            text-align: center;
            padding: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <span class="header-title">Pattern Details</span>
    </div>

    <div class="container" id="content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading pattern...</p>
        </div>
    </div>

    <script>
        let db;
        const DB_NAME = 'StopLossDB';
        const DB_VERSION = 1;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains('patterns')) {
                        database.createObjectStore('patterns', { keyPath: 'id' });
                    }
                };
            });
        }

        function validateSession() {
            const currentUser = sessionStorage.getItem('currentUser');
            if (!currentUser) {
                window.location.href = 'user-login.html';
                return false;
            }
            return true;
        }

        function getPatternId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('patternId');
        }

        async function loadPattern(patternId) {
            if (!patternId) {
                showError('No pattern ID provided');
                return;
            }

            try {
                await initDB();
                
                const transaction = db.transaction(['patterns'], 'readonly');
                const store = transaction.objectStore('patterns');
                const request = store.get(patternId);

                request.onsuccess = () => {
                    if (request.result) {
                        displayPattern(request.result);
                    } else {
                        showError('Pattern not found');
                    }
                };

                request.onerror = () => {
                    showError('Failed to load pattern');
                };
            } catch (error) {
                showError('Error loading pattern');
            }
        }

        function displayPattern(pattern) {
            const content = document.getElementById('content');
            const createdDate = pattern.createdAt ? new Date(pattern.createdAt).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }) : 'Unknown';

            const timesUsed = pattern.timesUsed || 0;
            const successRate = pattern.successRate || 0;
            const matchScore = pattern.matchScore || 0;

            content.innerHTML = `
                <div class="pattern-card">
                    <div class="pattern-header">
                        <div>
                            <h1 class="pattern-name">${escapeHtml(pattern.name)}</h1>
                            <span class="pattern-category">${escapeHtml(pattern.category)}</span>
                        </div>
                        <span class="pattern-status ${pattern.status === 'active' ? 'status-active' : 'status-inactive'}">
                            ${pattern.status === 'active' ? 'Active' : 'Inactive'}
                        </span>
                    </div>
                    
                    <p class="pattern-description">${escapeHtml(pattern.description)}</p>
                    
                    ${pattern.tags && pattern.tags.length > 0 ? `
                        <div class="pattern-tags">
                            ${pattern.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    ` : ''}
                    
                    <div class="info-row">
                        <span class="info-label">Match Score</span>
                        <span class="info-value match-score">${matchScore}%</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Status</span>
                        <span class="info-value">${pattern.status === 'active' ? 'Active' : 'Inactive'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Created</span>
                        <span class="info-value">${createdDate}</span>
                    </div>
                </div>

                <div class="how-it-works">
                    <h2 class="section-title">How This Pattern Works</h2>
                    <p>${escapeHtml(pattern.howItWorks || pattern.explanation || 'No detailed explanation available for this pattern. The pattern has been designed to identify specific market conditions and provide signals based on historical data analysis.')}</p>
                </div>

                <div class="performance-card">
                    <h2 class="section-title">Performance Statistics</h2>
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${timesUsed}</div>
                            <div class="stat-label">Times Used</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${successRate}%</div>
                            <div class="stat-label">Success Rate</div>
                        </div>
                    </div>
                    
                    <div class="success-rate">
                        <div style="display: flex; justify-content: space-between; font-size: 14px;">
                            <span style="color: rgba(255,255,255,0.5);">Overall Performance</span>
                            <span style="color: #2ed573; font-weight: 600;">${successRate}%</span>
                        </div>
                        <div class="rate-bar">
                            <div class="rate-fill" style="width: ${successRate}%"></div>
                        </div>
                    </div>
                </div>

                <div class="created-info">
                    Pattern ID: ${pattern.id}
                </div>
            `;
        }

        function showError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="error">
                    <p>${message}</p>
                    <button class="back-btn" style="margin: 20px auto; width: auto; padding: 10px 20px;" onclick="goBack()">Go Back</button>
                </div>
            `;
        }

        function goBack() {
            window.location.href = 'user-bot.html';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!validateSession()) return;
            
            const patternId = getPatternId();
            loadPattern(patternId);
        });
    </script>
</body>
</html>
