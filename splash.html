<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stop Loss Assistant</title>
  <link rel="manifest" href="../pwa/manifest.json">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/splash.css">
</head>
<body>
  <div id="splash-screen" class="splash-container">
    <!-- Animated background particles -->
    <div class="particles" id="particles"></div>

    <!-- Glow ring -->
    <div class="glow-ring"></div>
    <div class="glow-ring ring-2"></div>
    <div class="glow-ring ring-3"></div>

    <!-- Robot Logo SVG -->
    <div class="logo-container" id="logoContainer">
      <svg class="robot-logo" id="robotLogo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Robot Head -->
        <defs>
          <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3b82f6"/>
            <stop offset="50%" style="stop-color:#6366f1"/>
            <stop offset="100%" style="stop-color:#8b5cf6"/>
          </linearGradient>
          <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#06b6d4"/>
            <stop offset="100%" style="stop-color:#22d3ee"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!-- Antenna -->
        <line class="antenna-line" x1="100" y1="28" x2="100" y2="48" stroke="url(#bodyGrad)" stroke-width="3" stroke-linecap="round"/>
        <circle class="antenna-ball" cx="100" cy="22" r="6" fill="url(#eyeGrad)" filter="url(#glow)"/>

        <!-- Head -->
        <rect class="robot-head" x="55" y="48" width="90" height="70" rx="18" fill="url(#bodyGrad)" filter="url(#softGlow)"/>

        <!-- Face Plate -->
        <rect x="65" y="55" width="70" height="50" rx="12" fill="#0a0e1a" opacity="0.6"/>

        <!-- Eyes -->
        <circle class="eye eye-left" cx="82" cy="78" r="10" fill="url(#eyeGrad)" filter="url(#glow)"/>
        <circle class="eye eye-right" cx="118" cy="78" r="10" fill="url(#eyeGrad)" filter="url(#glow)"/>
        <circle class="pupil pupil-left" cx="82" cy="78" r="4" fill="#fff"/>
        <circle class="pupil pupil-right" cx="118" cy="78" r="4" fill="#fff"/>

        <!-- Mouth -->
        <path class="mouth" d="M 85 95 Q 100 105 115 95" stroke="url(#eyeGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>

        <!-- Ears -->
        <rect class="ear ear-left" x="42" y="62" width="13" height="30" rx="5" fill="url(#bodyGrad)"/>
        <rect class="ear ear-right" x="145" y="62" width="13" height="30" rx="5" fill="url(#bodyGrad)"/>

        <!-- Neck -->
        <rect x="90" y="118" width="20" height="12" rx="4" fill="url(#bodyGrad)"/>

        <!-- Body -->
        <rect class="robot-body" x="50" y="130" width="100" height="50" rx="14" fill="url(#bodyGrad)" filter="url(#softGlow)"/>

        <!-- Chest Light -->
        <circle class="chest-light" cx="100" cy="152" r="8" fill="url(#eyeGrad)" filter="url(#glow)"/>
        <circle cx="100" cy="152" r="4" fill="#fff" opacity="0.8"/>

        <!-- Chest Lines -->
        <line x1="70" y1="145" x2="85" y2="145" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
        <line x1="70" y1="150" x2="80" y2="150" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
        <line x1="115" y1="145" x2="130" y2="145" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
        <line x1="120" y1="150" x2="130" y2="150" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

        <!-- Arms -->
        <rect class="arm arm-left" x="30" y="135" width="18" height="35" rx="8" fill="url(#bodyGrad)"/>
        <rect class="arm arm-right" x="152" y="135" width="18" height="35" rx="8" fill="url(#bodyGrad)"/>

        <!-- Shield icon on body -->
        <path d="M 100 160 L 92 164 L 92 170 Q 92 176 100 180 Q 108 176 108 170 L 108 164 Z" fill="none" stroke="url(#eyeGrad)" stroke-width="1.5" filter="url(#glow)"/>
        <path d="M 100 164 L 97 166 L 97 169 Q 97 172 100 174 Q 103 172 103 169 L 103 166 Z" fill="url(#eyeGrad)" opacity="0.6"/>
      </svg>
    </div>

    <!-- App Name -->
    <div class="app-title" id="appTitle">
      <div class="title-line title-stop">STOP</div>
      <div class="title-line title-loss">LOSS</div>
      <div class="title-line title-assistant">ASSISTANT</div>
    </div>

    <!-- Tagline -->
    <div class="tagline" id="tagline">Smart Pattern Recognition System</div>

    <!-- Loading bar -->
    <div class="loading-container" id="loadingContainer">
      <div class="loading-bar">
        <div class="loading-fill" id="loadingFill"></div>
      </div>
      <div class="loading-text" id="loadingText">Initializing System...</div>
    </div>
  </div>

  <script>
    (function() {
      const splash = document.getElementById('splash-screen');
      const logo = document.getElementById('logoContainer');
      const title = document.getElementById('appTitle');
      const tagline = document.getElementById('tagline');
      const loadingContainer = document.getElementById('loadingContainer');
      const loadingFill = document.getElementById('loadingFill');
      const loadingText = document.getElementById('loadingText');
      const particles = document.getElementById('particles');

      // Create floating particles
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 5 + 's';
        p.style.animationDuration = (3 + Math.random() * 4) + 's';
        p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
        particles.appendChild(p);
      }

      // Play splash sound
      function playSplashSound() {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          // Create a pleasant startup chime
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.15);
            osc.stop(audioCtx.currentTime + i * 0.15 + 0.5);
          });
        } catch(e) {}
      }

      // Animation sequence
      const messages = [
        'Initializing System...',
        'Loading Pattern Engine...',
        'Connecting Modules...',
        'Preparing Interface...',
        'Almost Ready...'
      ];

      let progress = 0;
      const steps = 20;

      function startAnimation() {
        playSplashSound();

        // Logo entrance
        setTimeout(() => {
          logo.classList.add('visible');
        }, 300);

        // Title entrance
        setTimeout(() => {
          title.classList.add('visible');
        }, 800);

        // Tagline entrance
        setTimeout(() => {
          tagline.classList.add('visible');
        }, 1200);

        // Loading bar
        setTimeout(() => {
          loadingContainer.classList.add('visible');
          animateLoading();
        }, 1600);
      }

      function animateLoading() {
        const interval = setInterval(() => {
          progress += Math.random() * 15 + 5;
          if (progress >= 100) {
            progress = 100;
            loadingFill.style.width = '100%';
            loadingText.textContent = 'Ready!';
            clearInterval(interval);
            setTimeout(() => {
              splash.classList.add('fade-out');
              setTimeout(() => {
                window.location.href = '../login.html';
              }, 600);
            }, 500);
            return;
          }
          loadingFill.style.width = progress + '%';
          const msgIndex = Math.min(Math.floor(progress / 25), messages.length - 1);
          loadingText.textContent = messages[msgIndex];
        }, 200);
      }

      // Start
      setTimeout(startAnimation, 200);
    })();
  </script>
</body>
</html>
